on:
  push:
    branches: [main]
  pull_request:
jobs:
  build-packages:
    runs-on: nixos
    steps:
      - uses: "https://git.salame.cl/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7
      - run: nix --version
      - name: Build packages
        run: |
          nix-fast-build --no-nom --skip-cached --eval-workers 2 --flake .#packages.x86_64-linux
  checks:
    runs-on: nixos
    needs: build-packages
    steps:
      - uses: "https://git.salame.cl/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7
      - run: nix --version
      - name: Run checks
        env:
          NVIM: ${{ matrix.nvim }}
        run: |
          nix-fast-build --no-nom --skip-cached --eval-workers 2 --flake .#checks.x86_64-linux
  build-vm:
    runs-on: nixos
    needs:
      - build-packages
      - checks
    steps:
      - uses: "https://git.salame.cl/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7
      - run: nix --version
      - name: Build VM configuration
        run: |
          nix build --print-build-logs '.#nixosConfigurations.vm.config.system.build.toplevel'
  build-hm:
    runs-on: nixos
    needs:
      - build-packages
      - checks
    steps:
      - uses: "https://git.salame.cl/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7
      - run: nix --version
      - name: Build Home Manager configuration
        run: |
          nix build --print-build-logs '.#homeConfigurations.example.activationPackage'
  report-size:
    runs-on: nixos-taurus
    needs:
      - build-vm
      - build-hm
    steps:
      - uses: "https://git.salame.cl/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7
      - run: nix --version
      - name: Create Size Report
        uses: "https://git.salame.cl/jalil/nix-flake-outputs-size@ae138714ac6590a49ff087d75ef5a1d1a6bd294b" # main
        with:
          # Create a comment on the associated PR
          comment-on-pr: ${{ github.ref_name != 'main' }}
          # Generate artifacts on main (to speed up comparisons)
          generate-artifact: ${{ github.ref_name == 'main' }}
          # Generate comparisons to main
          do-comparison: 'true'
          # This job's name (so we can find the artifacts)
          job-name: report-size
